version: "3.9"

# ============================================================
# NL2SQL-Local — docker-compose.yml
# Lance PostgreSQL + Langfuse en une commande : docker compose up -d
# ============================================================

services:

  # Base de données cible (celle qu'on va interroger en langage naturel)
  postgres:
    image: postgres:16-alpine
    container_name: nl2sql_postgres
    environment:
      POSTGRES_DB: demo_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d demo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Monitoring LLM local (remplace LangSmith payant)
  # Interface disponible sur http://localhost:3000
  langfuse:
    image: ghcr.io/langfuse/langfuse:latest
    container_name: nl2sql_langfuse
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres/langfuse
      NEXTAUTH_SECRET: secret_local_nl2sql
      SALT: salt_local_nl2sql
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: